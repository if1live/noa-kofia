name: schedule

on:
  schedule:
    # 시간외 단일간 16:00 ~ 18:00
    # KRX 웹은 20분 지연 정보
    # 넉넉하게 18:30 이면 KRX 데이터 확정으로 볼수 있을듯?
    # KST 18:30 = UTC 09:30
    - cron: "30 9 * * *"
  workflow_dispatch: # 수동 실행 가능

jobs:
  schedule:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v3
        with:
          node-version: 24

      - uses: pnpm/action-setup@v2
        id: pnpm-install
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Restore data branch
        id: data-cache
        uses: actions/cache@v4
        with:
          path: |
            ./data
          key: data-cache-${{ github.sha }}
          restore-keys: |
            data-cache-

      - name: Checkout data branch
        if: steps.data-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v5
        with:
          ref: data
          path: data
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache repository (after checkout)
        if: steps.data-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ./data
          key: data-cache-${{ github.sha }}

      - name: Synchronize data branch
        working-directory: ./data
        run: |
          # -w0로 줄바꿈 제거
          BASIC=$(printf 'x-access-token:%s' "${{ secrets.GITHUB_TOKEN }}" | base64 -w0)
          git config 'http.https://github.com/.extraheader' "Authorization: basic $BASIC"

          git fetch origin
          git switch --discard-changes data
          git reset --hard origin/data

      - name: KOFIA
        run: |
          node src/cli.ts kofia --data-dir ./data

      - name: commit
        working-directory: ./data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add *
          git commit -m "schedule: ${TODAY_KST}" || echo "No changes to commit"
          git push origin data
